{% extends "page.html" %}

{% block sidebar %}

<div class="infobox">
  <div class="infobox-header">{{ item.name }}</div>
  <div class="infobox-image">
    <img src="{{ item.image_url | default('/assets/placeholder.svg') }}"
         alt="{{ item.name }}">
  </div>
  <table>
    {% if item.cooldown %}
    <tr><th>冷卻時間</th><td>{{ item.cooldown }} 秒</td></tr>
    {% endif %}
    {% if item.coverage %}
    <tr><th>塗鴉覆蓋率</th><td>{{ item.coverage }}%</td></tr>
    {% endif %}
    {% if item.unlock %}
    <tr><th>解鎖條件</th><td>{{ item.unlock }}</td></tr>
    {% endif %}
  </table>
</div>

{% endblock %}
