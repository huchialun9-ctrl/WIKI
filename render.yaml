services:
  - type: web
    name: meccha-chameleon-wiki
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    postDeployCommand: python init_db.py
    envVars:
      - key: WIKI_DB_HOST
        fromDatabase:
          name: meccha-wiki-db
          property: host
      - key: WIKI_DB_PORT
        fromDatabase:
          name: meccha-wiki-db
          property: port
      - key: WIKI_DB_NAME
        fromDatabase:
          name: meccha-wiki-db
          property: database
      - key: WIKI_DB_USER
        fromDatabase:
          name: meccha-wiki-db
          property: user
      - key: WIKI_DB_PASSWORD
        fromDatabase:
          name: meccha-wiki-db
          property: password
      - key: WIKI_SECRET_KEY
        generateValue: true
      - key: WIKI_DEBUG
        value: false

databases:
  - name: meccha-wiki-db
    databaseName: meccha_wiki
    user: wiki_admin
