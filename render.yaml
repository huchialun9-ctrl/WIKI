services:
  - type: web
    name: meccha-chameleon-wiki
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: WIKI_DB_HOST
        fromService:
          type: pserv
          name: meccha-wiki-db
          property: host
      - key: WIKI_DB_NAME
        value: meccha_wiki
      - key: WIKI_DB_USER
        value: wiki_admin
      - key: WIKI_DB_PASSWORD
        sync: false
      - key: WIKI_SECRET_KEY
        generateValue: true
      - key: WIKI_DEBUG
        value: false
      - key: WIKI_SITE_URL
        value: https://meccha-chameleon-wiki.onrender.com

  - type: pserv
    name: meccha-wiki-db
    env: python
    buildCommand: pip install psycopg2-binary
    startCommand: python -c "
import psycopg2, os;
from psycopg2.extensions import ISOLATION_LEVEL_AUTOCOMMIT;
conn = psycopg2.connect(host=os.environ.get('PGHOST','localhost'),user=os.environ.get('PGUSER','postgres'));
conn.set_isolation_level(ISOLATION_LEVEL_AUTOCOMMIT);
cur = conn.cursor();
cur.execute(\"SELECT 1 FROM pg_database WHERE datname='meccha_wiki'\");
if not cur.fetchone(): cur.execute('CREATE DATABASE meccha_wiki');
cur.close(); conn.close();
"
    envVars:
      - key: PGHOST
        fromService:
          type: pserv
          name: meccha-wiki-db
          property: host
